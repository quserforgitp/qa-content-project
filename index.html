<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="viewer-style.css">
  <title>Exercise Viewer | Student's code</title>
</head>
<body>
  <aside>
    <section id="exercises">
      <h2>Exercises</h2>
      <select id="exerciseSelector">
        <option value="01-button-click">01 - Button</option>
        <option value="02-form-validation">02 - Validation</option>
      </select>
    </section>
    <section id="instructions">
      <h3>Instructions</h3>
      <div id="instructions"></div>
    </section>
  </aside>
  <main>
    <section id="code">
      <h2 id="code-title">&lt;Code /&gt;</h2>
      <article id="coding-area">
        <div class="code-section">
          <h3>HTML (Just the body content)</h3>
          <textarea id="html-code" contenteditable="true"></textarea>
        </div>
        <div class="code-section">
          <h3>CSS</h3>
          <textarea id="css-code" contenteditable="true"></textarea>
        </div>
        <div class="code-section">
          <h3>JavaScript</h3>
          <textarea id="js-code" contenteditable="true"></textarea>
        </div>
      </article>
    </section>
    <section id="preview">
      <h2>Preview</h2>
      <iframe id="exerciseFrame" src=""></iframe>
    </section>
  </main>
  <script src="viewer.js"></script>
</body>
</html>
